<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de login do Trello</title>

    <!--
      <script src="https://unpkg.com/@codans/trello"></script>
    -->

    <script src="https://unpkg.com/@codans/trello"></script>

</head>
<body>

  <img src="/exercicios 88/img/trello.svg" alt="logo trello" width="200">

  <h1>Fazer login no trello</h1>

  <form action="processa.html" method="get">

    <label for="email"></label>
    <input type="text" name="email" id="email" placeholder="Insira seu E-mail">
    

    <label for="senha"></label>
    <input type="password" name="senha" id="sebha" placeholder="Insira sua Senha">
    

    <input type="submit" value="Fazer login">
    

    <span>Ou</span> 

    <Button type="submit">
      <img src="/exercicios 88/img/google.svg" alt="logo google" width="20px"> 
      Continuar com o Google
    </Button> 

    <Button type="submit">
      <img src="/exercicios 88/img/microsoft.svg" 
      alt="logo microsoft"
      width="20px">
      Continuar com o Microsoft
    </Button> 

    <Button type="submit">
      <img src="/exercicios 88/img/apple.svg" 
      alt="logo apple"
      width="20px">
      Continuar com a Apple
    </Button> 

    <Button type="submit">
      <img src="/exercicios 88/img/slack.svg" 
      alt="slack logo"
      width="20px">
      Continuar com o Slack
    </Button> 

  </form>

  <img src="/exercicios 88/img/atlassian.svg" 
  alt="atlassian"
  width="200px">

  <img src="/exercicios 88/img/analytics.svg" 
  alt="analytics"
  width="200px">

  <img src="/exercicios 88/img/interactive.svg" 
  alt="interactive"
  width="200px">

</body>
</html>
