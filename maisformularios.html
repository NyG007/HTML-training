<!DOCTYPE html>
<html lang="enpt-BR>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mais sobre Formulários</title>
</head>
<body>

    <h1>Mais sobre formulários</h1>
    <form action="" method="get">
    
        <h2>Label</h2>
        <!--
            label -> legenda  para item da interface
            for -> para   
        -->
        <label>
            Nome:
            <input type="text" name="nome">
        </label>

        <label for="E-mail">E-mail</label>
        <input type="text" name="E-mail" id="E-mail">

        <br>

        <h2>Mais elementos de formulário</h2>

        Gênero <br>
        <input type="radio" name="gênero">

        <input type="submit" value="cadastrar">

    </form>

</body>
 
</html>
