<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens</title>
</head>
<body>
    
    <!--
    img - IMaGe (imagem)
    src - SouRCe (fonte, origem)
    alt - ALTernative (alternativa)
    tipos imagens: png, jpg, jpeg, gif

    caminho relativo
    <img src="../../arquivos/Imagens/praia.jpeg" 

    caminho absoluto 
    <img src="/arquivos/Imagens/praia.jpeg" 

    figure (figura) -> usada para definir uma foto,
    ilustração, diagrama e etc.
    -->

    <figure>
        <img src="arquivos/Imagens/praia.jpeg" 
        alt="Imagem de uma praia, vista do alto"
        width="300"
        title="praia da boa vista">
        <figcaption>Praia da Boa Vista</figcaption>
    </figure>

    <img src="arquivos/Imagens/praia.jpeg" 
        alt="Imagem de uma praia, vista do alto"
        width="300"
        title="praia da boa vista">

        width="300"
        title="simbolo HTML"
    >
    </p>
    -->

</body>
</html>
