<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>

    <style>

        caption{
            background-color: black;
            color: white;
        }

        thead{
            background-color: darkgoldenrod;
            color: white;
        }

        tfoot{
            background-color: grey;
            font-weight: bold;
        }

    </style>

</head>
<body>

    <h1>Mais Sobre Tabelas</h1>

    <!--
        caption -> Legenda / titulo da tabela
        theade -> Table Hearder (cabeçalho da tabela)
        tbody -> Table Body (corpo da tabela)
        tfoot -> Table Footer (Rodapé da tabela)
    -->

    <table border="1">
        <caption>Listagem de Produtos</caption>

        <thead>
            <tr>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Preço</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Notebook</td>
                <td>1</td>
                <td>R$ 2000</td>
            </tr>
            <tr>
                <td>Tablet</td>
                <td>2</td>
                <td>R$ 1000</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td>total</td>
                <td colspan="2">R$ 4000</td>
            </tr>
        </tfoot>

    </table>
    
</body>
</html>
